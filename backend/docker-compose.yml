services:
  db:
    image: mariadb:11
    container_name: rosas-db-di
    restart: always
    environment:
      MARIADB_DATABASE: rosas-tattoo-di
      MARIADB_USER: user
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: rootpassword
    volumes:
      - mariadb_data_di:/var/lib/mysql
    ports:
      - "3312:3306"

  backend:
    build: .
    container_name: rosas-backend-di
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mariadb://db:3306/rosas-tattoo-di
      DB_USER: user
      DB_PASSWORD: password
      ADMIN_EMAIL: estudio@62rosastattoo.com
      ADMIN_PASSWORD: 62RosasTattoo
      JWT_SECRET: Yh73kLm9xQp4zR8tV2nB6wXc5AsD9fGhJkL0pQrS
      GOOGLE_PLACES_API_KEY: AIzaSyDNqtrdaM7ahCA1VO53XEWHOzJv9mD_wBc
      GOOGLE_PLACES_PLACE_ID: ChIJqfgSh2UVWQ0RiQ__C3hGI48
